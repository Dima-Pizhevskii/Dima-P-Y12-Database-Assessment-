<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golf Game</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <!-- firebase start ****************************************-->
  <!-- Firebase App (core Firebase SDK) is always required & must be listed 1st -->
 <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>
  <!-- Add Firebase products that you want to use -->
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-analytics.js"></script>
  <!-- firebase end ******************************************-->


  <!-- Include all your firebase libraries and scripts here -->
  <script type="module" src="fb_io.js"></script>
  <script type="module" src="select.js"></script>
  <script type="module" src="fb_config.js"></script>


  <script >function clearall(){
    firebase.database().ref('/').remove()
      console.log("cleared")
}</script>
</head>

<!--***************************************************
  BODY
****************************************************-->
<body>
  <div class="game-wrapper">
    <h1 class="game-title">GOLF 2D</h1>

    <div class="login-box">
        <div class="input-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">
        </div>
        
        <div class="input-group">
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="14" max="110">
        </div>

  <div class="input-group">
    <label>Favourite Number:</label>
    <input type="number" id="favouriteNumber">
  </div>
        <button class="login-btn" onclick="fb_popupLogin()">
            <span class="btn-main-text">LOGIN</span>
            <span class="btn-sub-text">With Google</span>
        </button>
         

  <button type="button" class="login-btn" onclick="writeForm()">
    <span class="btn-main-text">Next</span>
  </button>
   <p id="statusMessage" style="color: #437626; font-weight: bold; text-align: center;"></p>
</div>


</body>
</html>
